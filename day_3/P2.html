<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Tag: Span row/col</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <th colspan="3">Student Details</th>
      </tr>
      <tr>
        <td>Name</td>
        <td>Gagan K</td>
        <td>Shruthi</td>
      </tr>
      <tr>
        <td>Courses</td>
        <td>Computer Science</td>
        <td>Data Analytics</td>
      </tr>
    </table>
    <p>Rowspan</p>
    <table border="1">
      <tr>
        <th rowspan="2">Day</th>
        <th>Morning</th>
        <th>Evening</th>
      </tr>
      <tr>
        <td>Frontend Learning</td>
        <td>Frontend Practice</td>
      </tr>
    </table>
  </body>
</html>
