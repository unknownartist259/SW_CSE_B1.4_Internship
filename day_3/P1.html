<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Tables</title>
  </head>

  <body>
    <p>HTML Tables</p>
    <p>tr: table row th: table header td: table data</p>
    <table border="1">
      <caption>
        Monthly savings report
      </caption>
      <tr>
        <th>Month</th>
        <th>Savings</th>
      </tr>
      <tr>
        <td>May</td>
        <td>50000</td>
      </tr>
      <tr>
        <td>Jun</td>
        <td>150000</td>
      </tr>
    </table>

    <table border="1">
      <caption>
        Sales Data
      </caption>
      <thead>
        <tr>
          <th>Month</th>
          <th>Sales</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>May</td>
          <td>500000</td>
        </tr>
        <tr>
          <td>Jun</td>
          <td>150000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>1250000</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
